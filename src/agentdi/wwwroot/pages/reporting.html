<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporting Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <main>
    <h1>Reporting Agent</h1>
    <div class="subtitle">Statistical analysis and trend reports across all notices.</div>

    <div class="grid-3" id="stats"></div>

    <div class="grid-2">
      <div class="card">
        <h2>By Tax Type</h2>
        <div class="bar-chart" id="chart-tax"></div>
        <div class="bar-labels" id="labels-tax"></div>
      </div>
      <div class="card">
        <h2>By Urgency</h2>
        <div class="bar-chart" id="chart-urg"></div>
        <div class="bar-labels" id="labels-urg"></div>
      </div>
    </div>

    <div class="card">
      <h2>Trend Summary</h2>
      <div class="summary" id="summary"></div>
    </div>

    <div class="card">
      <h2>By Jurisdiction</h2>
      <table>
        <thead><tr><th>Jurisdiction</th><th>Count</th><th>Total Amount</th><th>Avg Days to Due</th></tr></thead>
        <tbody id="juris-body"></tbody>
      </table>
    </div>
  </main>

  <script src="../assets/data.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Reporting Agent');

    const notices = MOCK.notices;

    const total = notices.length;
    const action = notices.filter(n => n.actionRequired).length;
    const open = notices.filter(n => n.status !== 'Closed').length;
    const totalAmount = notices.reduce((s, n) => s + (n.amountDue || 0), 0);

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="num">${total}</div><div class="lbl">Total Notices</div></div>
      <div class="stat"><div class="num">${open}</div><div class="lbl">Open / In Review</div></div>
      <div class="stat"><div class="num">${action}</div><div class="lbl">Action Required</div></div>
    `;

    function groupCount(field) {
      const m = {};
      notices.forEach(n => { m[n[field]] = (m[n[field]] || 0) + 1; });
      return m;
    }

    function renderChart(chartId, labelId, data) {
      const max = Math.max(...Object.values(data), 1);
      const keys = Object.keys(data);
      document.getElementById(chartId).innerHTML = keys.map(k =>
        `<div class="bar" style="height:${(data[k] / max) * 100}%" data-value="${data[k]}"></div>`
      ).join('');
      document.getElementById(labelId).innerHTML = keys.map(k => `<span>${esc(k)}</span>`).join('');
    }

    renderChart('chart-tax', 'labels-tax', groupCount('taxType'));
    renderChart('chart-urg', 'labels-urg', groupCount('urgency'));

    const jurisMap = {};
    notices.forEach(n => {
      const j = n.jurisdiction;
      if (!jurisMap[j]) jurisMap[j] = { count: 0, amount: 0, days: [] };
      jurisMap[j].count++;
      jurisMap[j].amount += n.amountDue || 0;
      if (n.noticeDate && n.dueDate) {
        const d = (new Date(n.dueDate) - new Date(n.noticeDate)) / 86400000;
        jurisMap[j].days.push(d);
      }
    });
    document.getElementById('juris-body').innerHTML = Object.entries(jurisMap).map(([j, v]) => {
      const avg = v.days.length ? (v.days.reduce((a, b) => a + b, 0) / v.days.length).toFixed(1) : '—';
      return `<tr><td>${esc(j)}</td><td>${v.count}</td><td>${v.amount.toFixed(2)} USD</td><td>${avg}</td></tr>`;
    }).join('');

    const highCount = notices.filter(n => n.urgency === 'high').length;
    const pct = total ? Math.round((action / total) * 100) : 0;
    document.getElementById('summary').textContent =
      `${total} notices tracked across ${Object.keys(jurisMap).length} jurisdictions, totaling ${totalAmount.toFixed(2)} USD. ` +
      `${pct}% require action and ${highCount} are flagged high urgency. ` +
      `Sales Tax and Income Tax represent the largest share of incoming notices this period.`;
  </script>
</body>
</html>
