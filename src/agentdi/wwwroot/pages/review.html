<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Review</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <main>
    <h1>Human-in-the-Loop Review</h1>
    <div class="subtitle">Reviewers correct agent output. Corrections feed back to improve future accuracy.</div>

    <div class="grid-3" id="stats"></div>

    <div class="card">
      <h2>Review Queue</h2>
      <table>
        <thead>
          <tr><th>Item</th><th>Notice</th><th>Field</th><th>Agent Value</th><th>Human Value</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="queue-body"></tbody>
      </table>
    </div>

    <div class="card" id="edit-card" style="display:none;">
      <h2 id="edit-title">Correct Field</h2>
      <div class="row">
        <label>Agent value</label>
        <input type="text" id="agent-val" disabled />
      </div>
      <div class="row">
        <label>Corrected value</label>
        <input type="text" id="human-val" />
      </div>
      <div class="flex">
        <button id="approve">Approve Agent Value</button>
        <button id="save-corr" class="btn-secondary" style="color:#fff;background:#16a34a;">Save Correction</button>
      </div>
      <div id="msg"></div>
    </div>

    <div class="card">
      <h2>Learning Feedback</h2>
      <div class="summary" id="feedback-summary"></div>
    </div>
  </main>

  <script src="../assets/data.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Human Review');

    let editingId = null;

    function renderStats() {
      const q = MOCK.reviewQueue;
      const corrected = q.filter(x => x.status === 'corrected').length;
      const pending = q.filter(x => x.status === 'pending').length;
      const approved = q.filter(x => x.status === 'approved').length;
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="num">${pending}</div><div class="lbl">Pending Review</div></div>
        <div class="stat"><div class="num">${corrected}</div><div class="lbl">Corrected</div></div>
        <div class="stat"><div class="num">${approved}</div><div class="lbl">Approved</div></div>
      `;
      const total = q.length || 1;
      const accuracy = Math.round(((approved) / total) * 100);
      document.getElementById('feedback-summary').textContent =
        `Reviewers have processed ${corrected + approved} of ${q.length} items. ` +
        `Current agent accuracy on reviewed fields is approximately ${accuracy}%. ` +
        `Each correction is recorded and used to refine future extractions.`;
    }

    function renderQueue() {
      document.getElementById('queue-body').innerHTML = MOCK.reviewQueue.map(r => `
        <tr>
          <td>${esc(r.id)}</td>
          <td>${esc(r.noticeId)}</td>
          <td>${esc(r.field)}</td>
          <td>${esc(r.agentValue)}</td>
          <td>${r.humanValue == null ? '—' : esc(r.humanValue)}</td>
          <td><span class="badge ${r.status === 'pending' ? 'open' : r.status === 'corrected' ? 'review' : 'closed'}">${esc(r.status.toUpperCase())}</span></td>
          <td><button data-id="${r.id}">Review</button></td>
        </tr>
      `).join('');
      document.querySelectorAll('#queue-body button[data-id]').forEach(b =>
        b.addEventListener('click', () => openEdit(b.dataset.id))
      );
    }

    function openEdit(id) {
      const r = MOCK.reviewQueue.find(x => x.id === id);
      if (!r) return;
      editingId = id;
      document.getElementById('edit-card').style.display = 'block';
      document.getElementById('edit-title').textContent = `Correct ${r.field} on ${r.noticeId}`;
      document.getElementById('agent-val').value = r.agentValue;
      document.getElementById('human-val').value = r.humanValue ?? '';
      document.getElementById('msg').innerHTML = '';
    }

    document.getElementById('approve').addEventListener('click', () => {
      if (!editingId) return;
      const r = MOCK.reviewQueue.find(x => x.id === editingId);
      r.status = 'approved';
      r.humanValue = r.agentValue;
      document.getElementById('msg').innerHTML = `<div class="notice success">Agent value approved. Recorded as positive signal.</div>`;
      renderQueue(); renderStats();
    });

    document.getElementById('save-corr').addEventListener('click', () => {
      if (!editingId) return;
      const v = document.getElementById('human-val').value.trim();
      if (!v) { document.getElementById('msg').innerHTML = `<div class="notice warn">Please enter a corrected value.</div>`; return; }
      const r = MOCK.reviewQueue.find(x => x.id === editingId);
      r.humanValue = v;
      r.status = 'corrected';
      document.getElementById('msg').innerHTML = `<div class="notice success">Correction saved. Feedback queued for agent improvement.</div>`;
      renderQueue(); renderStats();
    });

    renderStats();
    renderQueue();
  </script>
</body>
</html>
