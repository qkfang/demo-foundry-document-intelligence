<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .field-grid { display: grid; grid-template-columns: 160px 1fr; gap: 8px 14px; font-size: 0.9rem; }
    .field-grid .k { color: var(--muted); font-weight: 600; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .email-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.9rem; white-space: pre-wrap; margin-top: 8px; }
    .reminder-list { list-style: none; padding: 0; margin: 0; }
    .reminder-list li { padding: 4px 0; font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Notification Agent</h1>
    <div class="subtitle">Upload a notice document to determine who to notify and generate an email assignment plan.</div>

    <div class="grid-2">
      <div class="card">
        <h2>Upload Notice Document</h2>
        <div class="row">
          <label>Notice file (PDF / image)</label>
          <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp" />
        </div>
        <button id="btn-upload">Run Notification Agent</button>
      </div>

      <div class="card">
        <h2>Assignment</h2>
        <div id="assignment-area"><div class="empty">No document processed yet.</div></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Email Draft</h2>
        <div id="email-area"><div class="empty">—</div></div>
      </div>
      <div class="card">
        <h2>Reminders &amp; Escalation</h2>
        <div id="reminders-area"><div class="empty">—</div></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Extracted Text</h2>
        <pre id="notice-json">—</pre>
      </div>
      <div class="card">
        <h2>Agent Raw Response</h2>
        <pre id="raw-response">—</pre>
      </div>
    </div>
  </main>

  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Notification Agent');

    function setLoading(loading) {
      const b = document.getElementById('btn-upload');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Processing...' : 'Run Notification Agent';
    }

    document.getElementById('btn-upload').addEventListener('click', async () => {
      const f = document.getElementById('file-input').files[0];
      if (!f) return;
      setLoading(true);
      const fd = new FormData();
      fd.append('file', f);
      try {
        const res = await fetch('/notification/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        render(data);
      } catch (err) {
        renderError(err.message);
      }
      setLoading(false);
    });

    function renderError(msg) {
      document.getElementById('assignment-area').innerHTML = `<div class="empty error">Error: ${esc(msg)}</div>`;
      document.getElementById('email-area').innerHTML = '<div class="empty">—</div>';
      document.getElementById('reminders-area').innerHTML = '<div class="empty">—</div>';
      document.getElementById('notice-json').textContent = '—';
      document.getElementById('raw-response').textContent = '—';
    }

    function render(data) {
      document.getElementById('notice-json').textContent = data.extractedText ?? '—';
      document.getElementById('raw-response').textContent = data.response ?? '—';

      const plan = tryParseJson(data.response);
      if (!plan) {
        document.getElementById('assignment-area').innerHTML = '<div class="empty">Agent did not return structured JSON.</div>';
        return;
      }

      document.getElementById('assignment-area').innerHTML = `
        <div class="field-grid">
          <div class="k">Assigned To</div><div>${esc(plan.assignedTo)}</div>
          <div class="k">Reason</div><div>${esc(plan.assignmentReason)}</div>
          <div class="k">Escalation</div><div>${esc(plan.escalationRule)}</div>
        </div>
      `;

      document.getElementById('email-area').innerHTML = `
        <div class="field-grid">
          <div class="k">Subject</div><div>${esc(plan.emailSubject)}</div>
        </div>
        <div class="email-box">${esc(plan.emailBody)}</div>
      `;

      const reminders = Array.isArray(plan.reminders) ? plan.reminders : [];
      document.getElementById('reminders-area').innerHTML = reminders.length
        ? `<ul class="reminder-list">${reminders.map(r => `<li><strong>${r.daysBefore} days before:</strong> ${esc(r.message)}</li>`).join('')}</ul>`
        : '<div class="empty">No reminders.</div>';
    }

    function tryParseJson(s) {
      if (!s) return null;
      const m = s.match(/\{[\s\S]*\}/);
      if (!m) return null;
      try { return JSON.parse(m[0]); } catch { return null; }
    }
  </script>
</body>
</html>
