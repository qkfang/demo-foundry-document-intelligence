<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correspondence Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .approval-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .approval-box {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      max-width: 520px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .approval-box h3 { margin-bottom: 6px; color: #1a1a2e; }
    .approval-box .label { font-size: 0.75rem; font-weight: 600; color: #555; text-transform: uppercase; margin: 14px 0 4px; }
    .approval-box pre { background: #f4f6f9; border-radius: 6px; padding: 10px; font-size: 0.8rem; white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow-y: auto; }
    .approval-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-approve:hover { background: #15803d; }
    .btn-reject { background: #dc2626; color: #fff; }
    .btn-reject:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <main>
    <h1>Correspondence Agent</h1>
    <div class="subtitle">Generate intelligent draft responses for any selected notice.</div>

    <div class="grid-2">
      <div class="card">
        <h2>Select Notice</h2>
        <div class="row">
          <label>Notice</label>
          <select id="notice-select"></select>
        </div>
        <div class="row">
          <label>Response Tone</label>
          <select id="tone">
            <option value="formal">Formal</option>
            <option value="concise">Concise</option>
            <option value="apologetic">Apologetic</option>
            <option value="dispute">Dispute</option>
          </select>
        </div>
        <div class="row">
          <label>Intent</label>
          <select id="intent">
            <option value="acknowledge">Acknowledge receipt</option>
            <option value="request-extension">Request extension</option>
            <option value="dispute">Dispute amount</option>
            <option value="confirm-payment">Confirm payment</option>
          </select>
        </div>
        <div class="row">
          <label>Additional Notes (optional)</label>
          <textarea id="notes" placeholder="Anything specific to include..."></textarea>
        </div>
        <button id="generate">Draft Response</button>
      </div>

      <div class="card">
        <h2>Draft Response</h2>
        <div id="draft-area">
          <div class="empty">Select a notice and click Draft Response.</div>
        </div>
      </div>
    </div>
  </main>

  <div id="approval-overlay" class="approval-overlay" style="display:none;">
    <div class="approval-box">
      <h3>Tool Call Approval Required</h3>
      <p style="color:#555;font-size:0.88rem;margin-top:4px;">The agent wants to call an external tool. Review the details and approve or reject.</p>
      <div class="label">Server</div>
      <div id="approval-server" style="font-weight:600;font-size:0.9rem;"></div>
      <div class="approval-actions">
        <button class="btn-approve" id="btn-approve">Approve</button>
        <button class="btn-reject" id="btn-reject">Reject</button>
      </div>
    </div>
  </div>

  <script src="../assets/data.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Correspondence Agent');

    const sel = document.getElementById('notice-select');
    sel.innerHTML = MOCK.notices.map(n =>
      `<option value="${n.id}">${esc(n.id)} — ${esc(n.entity)} (${esc(n.taxType)})</option>`
    ).join('');

    const draftArea = document.getElementById('draft-area');
    const overlay = document.getElementById('approval-overlay');

    function showLoading() {
      draftArea.innerHTML = '<div class="empty">Agent is running...</div>';
    }

    function showResult(response) {
      let display = response;
      try {
        const parsed = JSON.parse(response);
        display = JSON.stringify(parsed, null, 2);
      } catch (_) {}
      draftArea.innerHTML = `
        <textarea id="draft-text" style="min-height:280px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:0.82rem;">${esc(display)}</textarea>
        <div style="margin-top:10px;">
          <button id="copy">Copy</button>
        </div>
        <div id="save-msg"></div>
      `;
      document.getElementById('copy').addEventListener('click', () => {
        navigator.clipboard.writeText(document.getElementById('draft-text').value);
        document.getElementById('save-msg').innerHTML = '<div class="notice success">Copied to clipboard.</div>';
      });
    }

    function showApproval(runId, toolCall) {
      document.getElementById('approval-server').textContent = toolCall.serverLabel || '—';
      overlay.style.display = 'flex';

      document.getElementById('btn-approve').onclick = () => sendApproval(runId, true);
      document.getElementById('btn-reject').onclick = () => sendApproval(runId, false);
    }

    async function sendApproval(runId, approved) {
      overlay.style.display = 'none';
      showLoading();
      try {
        const res = await fetch('/correspondence/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ runId, approved })
        });
        const data = await res.json();
        if (data.status === 'pending_approval') {
          showApproval(data.runId, data.toolCall);
        } else {
          showResult(data.response ?? '');
        }
      } catch (err) {
        draftArea.innerHTML = `<div class="notice" style="color:#b91c1c;">Error: ${esc(String(err))}</div>`;
      }
    }

    document.getElementById('generate').addEventListener('click', async () => {
      const n = MOCK.notices.find(x => x.id === sel.value);
      const payload = {
        notice: n,
        tone: document.getElementById('tone').value,
        intent: document.getElementById('intent').value,
        notes: document.getElementById('notes').value.trim()
      };
      showLoading();
      try {
        const res = await fetch('/correspondence/draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: JSON.stringify(payload) })
        });
        const data = await res.json();
        if (data.status === 'pending_approval') {
          showApproval(data.runId, data.toolCall);
        } else {
          showResult(data.response ?? '');
        }
      } catch (err) {
        draftArea.innerHTML = `<div class="notice" style="color:#b91c1c;">Error: ${esc(String(err))}</div>`;
      }
    });
  </script>
</body>
</html>
