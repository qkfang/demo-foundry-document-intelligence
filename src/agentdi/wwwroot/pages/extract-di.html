<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract (DI)</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .field-grid { display: grid; grid-template-columns: 160px 1fr; gap: 8px 14px; font-size: 0.9rem; }
    .field-grid .k { color: var(--muted); font-weight: 600; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <h1>Extract (DI)</h1>
    <div class="subtitle">Upload a document and extract structured fields using Azure Document Intelligence.</div>

    <div class="grid-2">
      <div class="card">
        <h2>Upload Document</h2>
        <div class="row">
          <label>File (PDF, image, or Word document)</label>
          <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.doc,.docx" />
        </div>
        <button id="btn-upload">Extract</button>
      </div>

      <div class="card">
        <h2>Extracted Fields</h2>
        <div id="result-area">
          <div class="empty">No document processed yet.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Document Intelligence Output</h2>
      <pre id="raw-text">—</pre>
    </div>
  </main>

  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Extract (DI)');

    function setLoading(loading) {
      const b = document.getElementById('btn-upload');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Extracting...' : 'Extract';
    }

    document.getElementById('btn-upload').addEventListener('click', async () => {
      const f = document.getElementById('file-input').files[0];
      if (!f) return;
      setLoading(true);
      try {
        const base64Content = await fileToBase64(f);
        const res = await fetch('/extract/di/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ base64Content })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        render(data);
      } catch (err) {
        renderError(err.message);
      }
      setLoading(false);
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderError(msg) {
      document.getElementById('result-area').innerHTML = `<div class="empty error">Error: ${esc(msg)}</div>`;
      document.getElementById('raw-text').textContent = '—';
    }

    function render(data) {
      document.getElementById('raw-text').textContent = data.extractedText ?? '—';
      const parsed = tryParseJson(data.response);
      if (!parsed) {
        document.getElementById('result-area').innerHTML = `<div class="empty">Agent did not return structured JSON.</div>`;
        return;
      }
      const amount = parsed.amountDue != null ? String(parsed.amountDue) : '—';
      document.getElementById('result-area').innerHTML = `
        <div class="field-grid">
          <div class="k">Entity Name</div><div>${esc(parsed.entityName)}</div>
          <div class="k">Jurisdiction</div><div>${esc(parsed.jurisdiction)}</div>
          <div class="k">Notice Date</div><div>${esc(parsed.noticeDate)}</div>
          <div class="k">Due Date</div><div>${esc(parsed.dueDate)}</div>
          <div class="k">Amount Due</div><div>${esc(amount)}</div>
          <div class="k">Tax Type</div><div>${esc(parsed.taxType)}</div>
        </div>`;
    }

    function tryParseJson(s) {
      if (!s) return null;
      const m = s.match(/\{[\s\S]*\}/);
      if (!m) return null;
      try { return JSON.parse(m[0]); } catch { return null; }
    }
  </script>
</body>
</html>
