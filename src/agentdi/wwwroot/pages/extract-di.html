<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract (DI)</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <h1>Extract (DI)</h1>
    <div class="subtitle">Upload a document and extract raw text directly using Azure Document Intelligence (no agent).</div>

    <div class="card">
      <h2>Upload Document</h2>
      <div class="row">
        <label>File (PDF, image, or Word document)</label>
        <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.doc,.docx" />
      </div>
      <button id="btn-upload">Extract</button>
    </div>

    <div class="card">
      <h2>Document Intelligence Output</h2>
      <pre id="raw-text">—</pre>
    </div>
  </main>

  <script src="../assets/app.js"></script>
  <script>
    renderHeader('Extract (DI)');

    function setLoading(loading) {
      const b = document.getElementById('btn-upload');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Extracting...' : 'Extract';
    }

    document.getElementById('btn-upload').addEventListener('click', async () => {
      const f = document.getElementById('file-input').files[0];
      if (!f) return;
      setLoading(true);
      try {
        const fd = new FormData();
        fd.append('file', f);
        const res = await fetch('/extract/di/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        document.getElementById('raw-text').textContent = data.extractedText || '(no text extracted)';
      } catch (err) {
        document.getElementById('raw-text').textContent = `Error: ${err.message}`;
      }
      setLoading(false);
    });
  </script>
</body>
</html>
